<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"> <title>Login - ORAI-BOT</title> <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <style>
        /* 화면 중앙 정렬을 위한 스타일 */
        body { 
            height: 100vh; /* 화면 높이를 꽉 채움 */
            display: flex; /* 유연한 박스 모델 사용 */
            align-items: center; /* 세로 중앙 정렬 */
            justify-content: center; /* 가로 중앙 정렬 */
            background: #343a40; /* 배경색: 어두운 회색 (설계도와 일치) */
        }
        /* 로그인 상자 스타일 */
        .login-form { 
            background: #fff; /* 상자 배경: 흰색 */
            padding: 30px; /* 안쪽 여백 */
            border-radius: 10px; /* 모서리 둥글게 */
            width: 350px; /* 상자 너비 고정 */
        }
    </style>
</head>
<body>
    <form class="login-form shadow" method="POST">
        <h3 class="text-center mb-4">ORAI-BOT 관제</h3> <input type="text" name="username" class="form-control mb-2" placeholder="ID" required>
        
        <input type="password" name="password" class="form-control mb-3" placeholder="PW" required>
        
        <button class="btn btn-primary w-100">로그인</button> </form>
</body>
</html>
