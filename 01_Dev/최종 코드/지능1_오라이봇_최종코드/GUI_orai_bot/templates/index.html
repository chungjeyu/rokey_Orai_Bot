<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>오라이봇 관제 시스템</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f7f6; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header-wrapper { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3498db; margin-bottom: 20px; padding-bottom: 10px; }
        .status-box { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { flex: 1; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #3498db; color: white; }
        .btn { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; color: white; background-color: #3498db; font-weight: bold; }
        .btn-logs { background-color: #27ae60; text-decoration: none; display: inline-block; }
        .btn-confirm { background-color: #e67e22; width: 100%; margin-top: 10px; }
        .btn-manual { background-color: #95a5a6; width: 100%; margin-top: 5px; }
        
        /* 모달 스타일 */
        #goNoGoModal { 
            display: none; position: fixed; z-index: 999; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.7); 
            overflow-y: auto; /* 🔥 이 부분이 팝업창 바깥 스크롤을 만들어줍니다 */
        }
        .modal-content { 
            background: white; 
            margin: 5% auto 50px auto; /* 🔥 위쪽 여백을 조금 줄이고(10% -> 5%), 아래쪽 여백(50px)을 줘서 스크롤 시 버튼이 안 잘리게 합니다 */
            padding: 20px; width: 420px; border-radius: 10px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
        }
        .select-style { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 1.1em; background-color: #fff; cursor: pointer; }
        .modal-img { width: 100%; max-height: 220px; object-fit: contain; margin-bottom: 15px; border-radius: 5px; border: 1px solid #eee; }
        
        /* 🔥 새로 추가된 스타일: 스케줄 목록에서 클릭한 행을 시각적으로 강조 */
        .selected-row { background-color: #d1ecf1 !important; border: 2px solid #0c5460; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-wrapper">
        <h1>ORAI-BOT Control Center</h1>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="sys-info" style="font-size: 0.9em; color: #666;"></div>
            <a href="/logout" class="btn" style="background-color: #7f8c8d; text-decoration: none; padding: 6px 12px; font-size: 0.9em;">로그아웃</a>
        </div>
    </div>

    <div class="status-box">
        <div class="card">
            <h3>Robot 3 (Follower)</h3>
            <p>배터리: <span id="robot3-bat">-</span>%</p>
            <p id="robot3-state" style="font-weight:bold;">연결 확인 중</p>
        </div>
        <div class="card">
            <h3>Robot 4 (Leader)</h3>
            <p>배터리: <span id="robot4-bat">-</span>%</p>
            <p id="robot4-state" style="font-weight:bold;">연결 확인 중</p>
        </div>
    </div>

    <div style="margin-bottom: 30px; display: flex; gap: 15px; align-items: center; background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ddd;">
        <input type="file" id="excelFile" style="font-size: 15px; cursor: pointer;">
        <button class="btn" onclick="uploadExcel()">엑셀 등록하기</button>
        
        <div style="flex-grow: 1;"></div> 
        
        <a href="/logs" class="btn btn-logs">이벤트 로그</a>
        <button class="btn" style="background-color: #e74c3c;" onclick="triggerEmergencyStop()">비상 정지</button>
    </div>

    <h3>오늘의 작업 일정</h3>
    <table>
        <thead>
            <tr><th>날짜</th><th>클래스</th><th>예정시간</th><th>작업구역</th><th>상태</th></tr>
        </thead>
        <tbody id="schedule-table"></tbody>
    </table>
</div>

<div id="goNoGoModal">
    <div class="modal-content">
        <h2 style="color:#e67e22;">⚠️ 작업 승인 요청</h2>
        <img id="modal-img" class="modal-img">
        <p id="modal-info"></p>
        
        <div style="max-height: 150px; overflow-y: auto; margin-bottom: 15px; border: 1px solid #eee;">
            <table style="font-size: 0.9em; margin: 0;">
                <thead><tr><th>예정시간</th><th>목적지</th></tr></thead>
                <tbody id="modal-schedule-list"></tbody>
            </table>
        </div>

        <button class="btn btn-confirm" id="confirm-btn" onclick="confirmEntry()">선택한 스케줄로 출발</button>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        <p style="font-size: 0.85em; color: #666;">미등록 차량/구역 변경 시 직접 선택:</p>
        
        <select id="manual-area" class="select-style">
            <option value="">-- 구역 직접 선택 --</option>
            <option value="A">A구역</option>
            <option value="B">B구역</option>
        </select>
        
        <button class="btn btn-manual" onclick="manualEntry()">수동 지정 구역으로 출발</button>
        <button class="btn" style="background-color:#ccc; width:100%; margin-top:10px; color:black;" onclick="closeModal()">창 닫기</button>
    </div>
</div>

<script src="/static/js/main.js"></script>
</body>
</html>
